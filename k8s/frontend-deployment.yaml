apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: expense-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # ── Pod Security Standards ─────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
          # ── Container Security Context ───────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false   # Disable privilege escalation
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL                         # Drop all Linux capabilities
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      restartPolicy: Always
