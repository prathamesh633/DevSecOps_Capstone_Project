apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: expense-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        checkov.io/skip1: CKV_K8S_15=Image Pull Policy should be Always (Demo allowed)
        checkov.io/skip2: CKV_K8S_14=Image Tag should be fixed - not latest or blank (Demo allowed)
        checkov.io/skip3: CKV_K8S_43=Image should use digest (Demo allowed)
        checkov.io/skip4: CKV_K8S_40=Containers should run as a high UID (Demo allowed)
    spec:
      # Checkov CKV_K8S_38: Ensure that Service Account Tokens are only mounted where necessary
      automountServiceAccountToken: false
      # ── Pod Security Standards ─────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
          # ── Container Security Context ───────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false   # Disable privilege escalation
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL                         # Drop all Linux capabilities
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          
          # Checkov CKV_K8S_8: Liveness Probe Should be Configured
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          
          # Checkov CKV_K8S_9: Readiness Probe Should be Configured
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

      restartPolicy: Always
