apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: expense-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        checkov.io/skip1: CKV_K8S_15=Image Pull Policy should be Always (Demo allowed)
        checkov.io/skip2: CKV_K8S_14=Image Tag should be fixed - not latest or blank (Demo allowed)
        checkov.io/skip3: CKV_K8S_43=Image should use digest (Demo allowed)
        checkov.io/skip4: CKV_K8S_40=Containers should run as a high UID (Demo allowed)
        checkov.io/skip5: CKV_K8S_35=Prefer using secrets as files over secrets as environment variables (Demo allowed)
        checkov.io/skip6: CKV_K8S_22=Use read-only filesystem for containers where possible (Postgres needs write access)
    spec:
      # Checkov CKV_K8S_38: Ensure that Service Account Tokens are only mounted where necessary
      automountServiceAccountToken: false
      # ── Pod Security Standards ─────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:13
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: app-config
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-storage
          
          # ── Container Security Context ───────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false   # Disable privilege escalation
            capabilities:
              drop:
                - ALL                         # Drop all Linux capabilities
          
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          
          # Checkov CKV_K8S_8: Liveness Probe Should be Configured
          livenessProbe:
            exec:
              command:
                - "pg_isready"
                - "-U"
                - "postgres"
            initialDelaySeconds: 15
            periodSeconds: 20
          
          # Checkov CKV_K8S_9: Readiness Probe Should be Configured
          readinessProbe:
            exec:
              command:
                - "pg_isready"
                - "-U"
                - "postgres"
            initialDelaySeconds: 10
            periodSeconds: 10
      
      restartPolicy: Always

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
