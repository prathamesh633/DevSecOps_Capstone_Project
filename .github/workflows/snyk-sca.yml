name: Snyk Software Composition Analysis (SCA)

# Scans for:
#   - CVEs (Common Vulnerabilities and Exposures)
#   - Severity (CVSS scores – Critical / High / Medium / Low)
#   - Exploitability (whether vulnerable code paths are reachable)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Restrict default token permissions — each job overrides with only what it needs (CKV2_GHA_1)
permissions: read-all

jobs:
  # ── Python Backend ─────────────────────────────────────────────────────────
  snyk-python:
    name: Snyk SCA — Python Backend
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to GitHub Security tab
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk to scan Python dependencies
        id: snyk-python-scan
        continue-on-error: true   # don't fail CI immediately; let SARIF & summary decide
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=backend/requirements.txt \
            --severity-threshold=low \
            --sarif-file-output=snyk-python.sarif \
            --print-deps || true
          echo "Snyk Python scan complete"

      - name: Create empty SARIF if missing (safety net)
        if: always()
        run: |
          if [ ! -f snyk-python.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk","rules":[]}},"results":[]}]}' > snyk-python.sarif
          fi

      - name: Upload Python SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-python.sarif
          category: snyk-python

      - name: Upload Python SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-python-sarif
          path: snyk-python.sarif

  # ── JavaScript/React Frontend ──────────────────────────────────────────────
  snyk-node:
    name: Snyk SCA — JavaScript Frontend
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install   # use install (not ci) so lock file is regenerated if out-of-sync

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk to scan Node.js dependencies
        id: snyk-node-scan
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=frontend/package.json \
            --severity-threshold=low \
            --sarif-file-output=snyk-node.sarif \
            --print-deps || true
          echo "Snyk Node scan complete"

      - name: Create empty SARIF if missing (safety net)
        if: always()
        run: |
          if [ ! -f snyk-node.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"Snyk","rules":[]}},"results":[]}]}' > snyk-node.sarif
          fi

      - name: Upload Node SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-node.sarif
          category: snyk-node

      - name: Upload Node SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-node-sarif
          path: snyk-node.sarif

  # ── Summary ────────────────────────────────────────────────────────────────
  sca-summary:
    name: SCA Summary
    runs-on: ubuntu-latest
    needs: [ snyk-python, snyk-node ]
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## 🔍 Snyk SCA Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Backend (requirements.txt) | ${{ needs.snyk-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JS Frontend (package.json) | ${{ needs.snyk-node.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What Was Scanned" >> $GITHUB_STEP_SUMMARY
          echo "| Finding | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| **CVEs** | CVE IDs from NVD, GitHub Advisory Database, and Snyk Intel |" >> $GITHUB_STEP_SUMMARY
          echo "| **Severity** | CVSS v3.1 score — Critical / High / Medium / Low |" >> $GITHUB_STEP_SUMMARY
          echo "| **Exploitability** | Snyk's reachability analysis — whether the vulnerable function is actually called |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📁 Full SARIF reports uploaded to **GitHub Security → Code scanning alerts**" >> $GITHUB_STEP_SUMMARY
