name: Destroy Infrastructure

# checkov:skip=CKV_GHA_7: workflow_dispatch inputs are intentional — users must select target cloud provider
on:
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: 'Select cloud provider to destroy'
        required: true
        default: 'both'
        type: choice
        options:
          - aws
          - azure
          - both

# Restrict default token permissions (CKV2_GHA_1)
permissions: read-all

env:
  TF_IN_AUTOMATION: "true"

jobs:
  destroy-aws:
    if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == 'both'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/aws

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Validate Required AWS Secrets
        run: |
          test -n "${{ secrets.AWS_TF_STATE_BUCKET }}" || (echo "Missing secret: AWS_TF_STATE_BUCKET" && exit 1)
          test -n "${{ secrets.TF_VAR_DB_PASSWORD }}" || (echo "Missing secret: TF_VAR_DB_PASSWORD" && exit 1)
          DB_PASSWORD='${{ secrets.TF_VAR_DB_PASSWORD }}'
          if [ "${#DB_PASSWORD}" -lt 8 ] || [ "${#DB_PASSWORD}" -gt 128 ]; then
            echo "Invalid TF_VAR_DB_PASSWORD: must be 8-128 characters."
            exit 1
          fi
          if [[ "$DB_PASSWORD" =~ [/@\"\ ] ]]; then
            echo "Invalid TF_VAR_DB_PASSWORD: must not contain '/', '@', '\"', or spaces."
            exit 1
          fi
          if ! printf '%s' "$DB_PASSWORD" | LC_ALL=C grep -q '^[ -~]*$'; then
            echo "Invalid TF_VAR_DB_PASSWORD: only printable ASCII characters are allowed."
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.AWS_TF_STATE_BUCKET }}" \
            -backend-config="key=aws/expense-tracker/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform Destroy
        run: terraform destroy -input=false -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" -auto-approve

  destroy-azure:
    if: inputs.cloud_provider == 'azure' || inputs.cloud_provider == 'both'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/azure

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Destroy
        run: terraform destroy -var="db_admin_password=${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}" -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
