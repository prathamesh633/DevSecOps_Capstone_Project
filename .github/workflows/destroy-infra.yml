name: Destroy Infrastructure

# checkov:skip=CKV_GHA_7: workflow_dispatch inputs are intentional — users must select target cloud provider
on:
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: 'Select cloud provider to destroy'
        required: true
        default: 'both'
        type: choice
        options:
          - aws
          - azure
          - both

# Restrict default token permissions (CKV2_GHA_1)
permissions: read-all

jobs:
  destroy-aws:
    if: inputs.cloud_provider == 'aws' || inputs.cloud_provider == 'both'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/aws
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" -auto-approve

  destroy-azure:
    if: inputs.cloud_provider == 'azure' || inputs.cloud_provider == 'both'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/azure

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Destroy
        run: terraform destroy -var="db_admin_password=${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}" -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
