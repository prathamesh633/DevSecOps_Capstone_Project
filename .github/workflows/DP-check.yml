name: DP-check (OWASP Dependency-Check)

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch:
    inputs:
      refresh_db:
        description: "Refresh vulnerability database before scan"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 2 * * *"

permissions: read-all

jobs:
  dependency-check:
    name: OWASP Dependency-Check Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: ${{ runner.os }}-dependency-check-data
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: Run OWASP Dependency-Check
        run: |
          set -euo pipefail
          mkdir -p reports/dependency-check .dependency-check-data

          UPDATE_ARG="--noupdate"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            UPDATE_ARG=""
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.refresh_db }}" = "true" ]; then
            UPDATE_ARG=""
          fi

          # First fast-mode run can fail when cache is empty.
          if [ "$UPDATE_ARG" = "--noupdate" ] && [ -z "$(find .dependency-check-data -mindepth 1 -type f -print -quit)" ]; then
            echo "Dependency-Check cache is empty; switching to update mode for this run."
            UPDATE_ARG=""
          fi

          UPDATE_MODE="--update"
          if [ -n "$UPDATE_ARG" ]; then
            UPDATE_MODE="$UPDATE_ARG"
          fi

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/src" \
            -v "${GITHUB_WORKSPACE}/.dependency-check-data:/usr/share/dependency-check/data" \
            owasp/dependency-check:latest \
            --project "${GITHUB_REPOSITORY}" \
            --scan /src/backend \
            --scan /src/frontend \
            --out /src/reports/dependency-check \
            --format "ALL" \
            --log /src/reports/dependency-check/dependency-check.log \
            --exclude "/src/**/node_modules/**" \
            --exclude "/src/**/.venv/**" \
            --exclude "/src/**/venv/**" \
            --exclude "/src/**/.git/**" \
            --failOnCVSS 11 \
            ${UPDATE_ARG} | tee reports/dependency-check/dependency-check-console.log

          {
            echo "scanDateUtc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "workflowRunId=${GITHUB_RUN_ID}"
            echo "commitSha=${GITHUB_SHA}"
            echo "eventName=${GITHUB_EVENT_NAME}"
            echo "updateMode=${UPDATE_MODE}"
          } > reports/dependency-check/scan-metadata.txt

      - name: Upload Dependency-Check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            reports/dependency-check/
          if-no-files-found: warn

      - name: Add run summary
        if: always()
        run: |
          echo "## OWASP Dependency-Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Reports generated (when scan succeeds) and uploaded as artifact: **dependency-check-report**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact includes all generated report formats, scanner logs, and scan metadata." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Fast mode: push/PR runs use cached DB (\`--noupdate\`)." >> "$GITHUB_STEP_SUMMARY"
          echo "DB refresh runs on daily schedule or manual dispatch with \`refresh_db=true\`." >> "$GITHUB_STEP_SUMMARY"
