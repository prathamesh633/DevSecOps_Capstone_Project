name: SonarQube Static Code Analysis

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch:

permissions: read-all

env:
  TF_IN_AUTOMATION: "true"
  PYTHONUNBUFFERED: "1"

jobs:
  sonarqube-analysis:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required SonarQube secrets
        run: |
          test -n "${{ secrets.SONAR_TOKEN }}" || (echo "Missing secret: SONAR_TOKEN" && exit 1)
          test -n "${{ secrets.SONAR_HOST_URL }}" || (echo "Missing secret: SONAR_HOST_URL" && exit 1)

      - name: Resolve SonarQube project key
        id: sonar_project
        env:
          SONAR_PROJECT_KEY_SECRET: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_PROJECT_KEY_VAR: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          if [ -n "$SONAR_PROJECT_KEY_SECRET" ]; then
            KEY="$SONAR_PROJECT_KEY_SECRET"
          elif [ -n "$SONAR_PROJECT_KEY_VAR" ]; then
            KEY="$SONAR_PROJECT_KEY_VAR"
          else
            KEY="${GITHUB_REPOSITORY//\//_}"
            echo "::warning::SONAR_PROJECT_KEY is not set. Falling back to repository-derived key: $KEY"
          fi
          echo "value=$KEY" >> "$GITHUB_OUTPUT"

      - name: Show SonarQube project key in use
        run: |
          echo "Using SonarQube project key: ${{ steps.sonar_project.outputs.value }}"

      - name: Validate SonarQube project visibility for token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ steps.sonar_project.outputs.value }}
        run: |
          set -euo pipefail
          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(curl -sS -u "${SONAR_TOKEN}:" -o "$RESPONSE_FILE" -w "%{http_code}" \
            "${SONAR_HOST_URL}/api/projects/search?projects=${SONAR_PROJECT_KEY}")"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Unable to query SonarQube API (HTTP $HTTP_CODE). Check SONAR_HOST_URL and SONAR_TOKEN."
            cat "$RESPONSE_FILE"
            exit 1
          fi

          if ! grep -q "\"key\":\"${SONAR_PROJECT_KEY}\"" "$RESPONSE_FILE"; then
            echo "::error::Project key '${SONAR_PROJECT_KEY}' is not visible to this token."
            echo "::error::Set SONAR_PROJECT_KEY (repo secret/variable) to an existing SonarQube project key and grant this token 'Execute Analysis' on that project."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies and test tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov bandit safety

      - name: Run backend tests with coverage
        run: |
          pytest backend --cov=backend --cov-report=xml:backend/coverage.xml --cov-report=term-missing || true

      - name: Run Bandit (non-blocking)
        run: |
          bandit -r backend -f json -o bandit-report.json || true

      - name: Run Safety (non-blocking)
        run: |
          safety check -r backend/requirements.txt --json > safety-report.json || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci || {
            echo "npm ci failed due to lockfile drift; running npm install to continue scan workflow."
            npm install
          }

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: CI=true npm test -- --watchAll=false --coverage --passWithNoTests

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ steps.sonar_project.outputs.value }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Upload Safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json
