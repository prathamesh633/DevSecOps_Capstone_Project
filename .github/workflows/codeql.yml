name: CodeQL Security Analysis

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
#   schedule:
#     # Run every Monday at 07:00 UTC for scheduled security sweeps
#     - cron: '0 7 * * 1'

# Restrict default token permissions — each job overrides with only what it needs (CKV2_GHA_1)
permissions: read-all

jobs:
  codeql-analysis:
    name: CodeQL Scan (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # required to upload SARIF results
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language:
          - python    # Flask backend
          - javascript  # React frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── CodeQL initialisation ───────────────────────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Query suites targeting security vulnerabilities:
          # hardcoded secrets, injection, weak crypto, insecure
          # deserialization, and poor error handling.
          queries: security-and-quality,security-extended
          config: |
            query-filters:
              - include:
                  tags contain:
                    - security
                    - correctness
            paths-ignore:
              - '**/node_modules/**'
              - '**/venv/**'
              - '**/__pycache__/**'

      # ── Auto-build (CodeQL traces compilable languages) ────────────────────
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      # ── CodeQL analysis ─────────────────────────────────────────────────────
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
          # SARIF output enables GitHub Security tab integration
          output: codeql-results-${{ matrix.language }}.sarif
          upload: true

      # ── Upload SARIF for detailed review ────────────────────────────────────
      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: codeql-results-${{ matrix.language }}.sarif

  # ── Summary job ─────────────────────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: codeql-analysis
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## CodeQL Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Language | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python (Backend) | ${{ needs.codeql-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JavaScript (Frontend) | ${{ needs.codeql-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Vulnerability Categories Scanned" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Hardcoded Secrets" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Injection Issues (SQL, OS, SSTI)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Weak Cryptography" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Insecure Deserialization" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Poor Error Handling" >> $GITHUB_STEP_SUMMARY
